# Jekyll 配置文件

title: Javarock's Blog
description: One side survival, one side life
author: Javarock
email: your-email@example.com
baseurl: ""
url: "https://javarock.github.io"

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 分页
paginate: 10
paginate_path: "/blog/page:num/"

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# 排除文件
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .DS_Store
